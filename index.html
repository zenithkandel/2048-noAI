<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>2048 without AI</title>
  </head>
  <body>
    <h1 class="title"><i class="fa fa-sharp-duotone fa-grid"></i> 2048</h1>
    <h3 class="sub-title">
      <span class="status"></span>
      just trying to check how much i remember about coding without AI in 2026
    </h3>
    <div class="config">
      <!-- <span>Select Grid Size: </span> -->
      <div class="chip grid-size" value="4">4x4</div>
      <div class="chip grid-size" value="8">8x8</div>
      <div class="chip grid-size" value="16">16x16</div>
    </div>
    <div class="canvas">
      <div class="pause-screen">
        <i class="fa fa-pause fa-sharp-duotone fa-thin"></i>
        <span>Paused</span>
      </div>
      <div class="grid"></div>
    </div>
    <div class="controls">
      <div class="chip control-restart">
        <i class="fa-sharp-duotone fa-thin fa-arrow-rotate-left"></i> Restart
      </div>
      <div class="chip control-pause">
        <i class="fa-sharp-duotone fa-thin fa-pause"></i> Pause
      </div>
      <div class="chip control-save">
        <i class="fa-sharp-duotone fa-thin fa-save"></i> Save
      </div>
    </div>
  </body>
  <script src="script.js"></script>
  <script src="https://zenithkandel.com.np/fontawesome/zenith-icons.js"></script>
</html>
